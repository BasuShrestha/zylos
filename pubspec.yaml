name: zylos
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_metadata_reader: ^1.6.0
  flutter_riverpod: ^3.3.1
  sqflite: ^2.4.3
  path: ^1.9.1
  permission_handler: ^12.0.3
  path_provider: ^2.1.5
  palette_generator: ^0.3.3+7
  just_audio_background: ^0.0.1-beta.17
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/zylos_app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0d0d0d"
  adaptive_icon_foreground: "assets/icon/zylos_app_icon.png"

flutter_native_splash:
  color: "#0d0d0d"
  image: assets/splash/zylos_app_icon.png
  color_dark: "#0d0d0d"
  image_dark: assets/splash/zylos_app_icon.png
  android_12:
    image: assets/splash/zylos_app_icon.png
    icon_background_color: "#0d0d0d"
    color: "#0d0d0d"
    color_dark: "#0d0d0d"
  fullscreen: true
