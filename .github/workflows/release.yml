name: Build and Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: "3.44.1"
          channel: "stable"

      - name: Ensure flutter.sdk in local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEY_STORE_BASE64 }}" | base64 --decode > android/app/zylos.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > android/app/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/key.properties
          echo "storeFile=zylos.jks" >> android/app/key.properties

      - name: Patch gradle.properties for AGP 9 compatibility
        run: |
          echo "android.newDsl=false" >> android/gradle.properties

      - name: Build release APK
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Get version
        id: version
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=1.0.$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Zylos v${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}

            **Which APK to install:**
            - Most phones (2018+): `app-arm64-v8a-release.apk` (64-bit)
            - Older phones: `app-armeabi-v7a-release.apk` (32-bit)
            - Emulators: `app-x86_64-release.apk`

            # **Install:** Download `app-release.apk` below and install on your Android device.
            Enable "Install from unknown sources" in your device settings first.
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
